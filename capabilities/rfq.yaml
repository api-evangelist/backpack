    description: Backpack Exchange RFQ business capability. ED25519 signed requests.
    resources:
    - name: api-v1-rfq-quote
      path: /api/v1/rfq/quote
      operations:
      - name: submit-quote
        method: POST
        description: Submit quote.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-rfqs
      path: /api/v1/rfqs
      operations:
      - name: get-open-rfqs
        method: GET
        description: Get open RFQs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-rfq
      path: /api/v1/rfq
      operations:
      - name: submit-rfq
        method: POST
        description: Submit RFQ.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
