          description: Request body (JSON).
          required: true
    - name: api-v1-rfq-accept
      path: /api/v1/rfq/accept
      operations:
      - name: accept-quote
        method: POST
        description: Accept quote.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-rfq-refresh
      path: /api/v1/rfq/refresh
      operations:
      - name: refresh-rfq
        method: POST
        description: Refresh RFQ.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-rfq-cancel
      path: /api/v1/rfq/cancel
      operations:
      - name: cancel-rfq
        method: POST
        description: Cancel RFQ.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
