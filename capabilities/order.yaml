naftiko: 1.0.0-alpha2
info:
  label: "Backpack Exchange \u2014 Order"
  description: "Backpack Exchange API \u2014 Order. 8 operations. Self-contained Naftiko capability covering one Backpack business surface."
  tags:
  - Backpack
  - Exchange
  - Order
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    BACKPACK_API_KEY: BACKPACK_API_KEY
    BACKPACK_API_SECRET: BACKPACK_API_SECRET
capability:
  consumes:
  - type: http
    namespace: backpack-order
    baseUri: https://api.backpack.exchange
    description: Backpack Exchange Order business capability. ED25519 signed requests.
    resources:
    - name: api-v1-order
      path: /api/v1/order
      operations:
      - name: get-order
        method: GET
        description: Get open order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: execute-order
        method: POST
        description: Execute order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: cancel-order
        method: DELETE
        description: Cancel open order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-orders
      path: /api/v1/orders
      operations:
      - name: execute-order-batch
        method: POST
        description: Execute orders.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: get-open-orders
        method: GET
        description: Get open orders.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancel-open-orders
        method: DELETE
        description: Cancel open orders.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: wapi-v1-history-fills
      path: /wapi/v1/history/fills
      operations:
      - name: get-fills
        method: GET
        description: Get fill history.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: wapi-v1-history-orders
      path: /wapi/v1/history/orders
      operations:
      - name: get-order-history
        method: GET
        description: Get order history.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BACKPACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: backpack-order-rest
    port: 8080
    description: "REST adapter for Backpack Exchange \u2014 Order."
    resources:
    - path: /api/v1/order
      name: api-v1-order
      description: REST surface for api-v1-order.
      operations:
      - method: GET
        name: get-order
        description: Get open order.
        call: backpack-order.get-order
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: execute-order
        description: Execute order.
        call: backpack-order.execute-order
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancel-order
        description: Cancel open order.
        call: backpack-order.cancel-order
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v1/orders
      name: api-v1-orders
      description: REST surface for api-v1-orders.
      operations:
      - method: POST
        name: execute-order-batch
        description: Execute orders.
        call: backpack-order.execute-order-batch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-open-orders
        description: Get open orders.
        call: backpack-order.get-open-orders
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancel-open-orders
        description: Cancel open orders.
        call: backpack-order.cancel-open-orders
        outputParameters:
        - type: object
          mapping: $.
    - path: /wapi/v1/history/fills
      name: wapi-v1-history-fills
      description: REST surface for wapi-v1-history-fills.
      operations:
      - method: GET
        name: get-fills
        description: Get fill history.
        call: backpack-order.get-fills
        outputParameters:
        - type: object
          mapping: $.
    - path: /wapi/v1/history/orders
      name: wapi-v1-history-orders
      description: REST surface for wapi-v1-history-orders.
      operations:
      - method: GET
        name: get-order-history
        description: Get order history.
        call: backpack-order.get-order-history
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: backpack-order-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Backpack Exchange \u2014 Order."
    tools:
    - name: backpack-get-order
      description: Get open order.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-order.get-order
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-execute-order
      description: Execute order.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: backpack-order.execute-order
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-cancel-order
      description: Cancel open order.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: backpack-order.cancel-order
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-execute-order-batch
      description: Execute orders.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: backpack-order.execute-order-batch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-open-orders
      description: Get open orders.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-order.get-open-orders
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-cancel-open-orders
      description: Cancel open orders.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: backpack-order.cancel-open-orders
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-fills
      description: Get fill history.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-order.get-fills
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-order-history
      description: Get order history.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-order.get-order-history
      outputParameters:
      - type: object
        mapping: $.
