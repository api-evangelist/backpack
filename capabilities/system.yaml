naftiko: 1.0.0-alpha2
info:
  label: "Backpack Exchange \u2014 System"
  description: "Backpack Exchange API \u2014 System. 4 operations. Self-contained Naftiko capability covering one Backpack business surface."
  tags:
  - Backpack
  - Exchange
  - System
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    BACKPACK_API_KEY: BACKPACK_API_KEY
    BACKPACK_API_SECRET: BACKPACK_API_SECRET
capability:
  consumes:
  - type: http
    namespace: backpack-system
    baseUri: https://api.backpack.exchange
    description: Backpack Exchange System business capability. ED25519 signed requests.
    resources:
    - name: api-v1-status
      path: /api/v1/status
      operations:
      - name: get-status
        method: GET
        description: Get system status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-ping
      path: /api/v1/ping
      operations:
      - name: ping
        method: GET
        description: Ping.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-time
      path: /api/v1/time
      operations:
      - name: get-time
        method: GET
        description: Get system time.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-wallets
      path: /api/v1/wallets
      operations:
      - name: get-wallets
        method: GET
        description: Get wallets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BACKPACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: backpack-system-rest
    port: 8080
    description: "REST adapter for Backpack Exchange \u2014 System."
    resources:
    - path: /api/v1/status
      name: api-v1-status
      description: REST surface for api-v1-status.
      operations:
      - method: GET
        name: get-status
        description: Get system status.
        call: backpack-system.get-status
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v1/ping
      name: api-v1-ping
      description: REST surface for api-v1-ping.
      operations:
      - method: GET
        name: ping
        description: Ping.
        call: backpack-system.ping
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v1/time
      name: api-v1-time
      description: REST surface for api-v1-time.
      operations:
      - method: GET
        name: get-time
        description: Get system time.
        call: backpack-system.get-time
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v1/wallets
      name: api-v1-wallets
      description: REST surface for api-v1-wallets.
      operations:
      - method: GET
        name: get-wallets
        description: Get wallets.
        call: backpack-system.get-wallets
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: backpack-system-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Backpack Exchange \u2014 System."
    tools:
    - name: backpack-get-status
      description: Get system status.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-system.get-status
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-ping
      description: Ping.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-system.ping
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-time
      description: Get system time.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-system.get-time
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-wallets
      description: Get wallets.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-system.get-wallets
      outputParameters:
      - type: object
        mapping: $.
