      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-capital.get-deposits
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-deposit-address
      description: Get deposit address.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-capital.get-deposit-address
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-get-withdrawals
      description: Get withdrawals.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: backpack-capital.get-withdrawals
      outputParameters:
      - type: object
        mapping: $.
    - name: backpack-request-withdrawal
      description: Request withdrawal.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: backpack-capital.request-withdrawal
      with:
        body: tools.body
      outputParameters:
      - type: object
