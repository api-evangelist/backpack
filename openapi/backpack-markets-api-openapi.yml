          type: string
          format: decimal
    ResolutionCondition_StrikePriceResolutionCondition:
      description: Condition that determines how a prediction market resolves.
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - StrikePrice
            example: StrikePrice
      - $ref: '#/components/schemas/StrikePriceResolutionCondition'
    SecuritySession:
      type: object
      title: SecuritySession
      required:
      - name
      - minQuantity
      - stepSize
      properties:
        name:
          type: string
          description: Session name — matches a name in the sessions list.
        minQuantity:
          type: string
          format: decimal
          description: Minimum order quantity during this session.
        maxQuantity:
          type: string
          format: decimal
          description: Maximum order quantity during this session.
        stepSize:
          type: string
          format: decimal
          description: Minimum quantity increment during this session.
    Tag:
      type: object
      title: Tag
      required:
      - slug
      - title
      properties:
        slug:
          type: string
          description: Tag associated with the prediction event.
        title:
          type: string
          description: The tag title of the prediction market.
    PriceBandMeanPremium:
      type: object
      title: PriceBandMeanPremium
      required:
      - tolerancePct
      properties:
        tolerancePct:
          type: string
          format: decimal
          description: 'Maximum allowed deviation from the mean premium. E.g. if

            `tolerance_pct` is 0.05 (5%), and the mean premium is 5%, then

            orders will be prevented from being placed if the premium exceeds 10%.'
    Resolution:
      type: object
      title: Resolution
      description: Resolution data for a prediction event.
      required:
      - resolved
      - startDate
      properties:
        resolved:
          type: boolean
          description: Whether the event has been resolved. An event is resolved when all associated markets are resolved.
        startDate:
          type: string
          format: naive-date-time
          description: Start time of the prediction event.
        endDate:
          type: string
          format: naive-date-time
          description: End time of the prediction event.
        strikePrice:
          type: string
          format: decimal
          description: The strike price for the prediction event at the start date.
        closePrice:
          type: string
          format: decimal
          description: The closing price at the end of the prediction event at the end date.
        resolutionSourceEventIdentifier:
          type: string
          description: The identifier on the resolution source e.g. BTCUSDT for Binance.
        resolutionSource:
          description: The source for event resolution.
          allOf:
          - $ref: '#/components/schemas/ResolutionSource'
          - description: The source for event resolution.
        outcome:
          type: string
          description: The outcome for outcome-based resolution, e.g. an election winner.
    QuantityFilter:
      type: object
      title: QuantityFilter
      required:
      - minQuantity
      - stepSize
      properties:
        minQuantity:
          type: string
          format: decimal
          description: 'Minimum quantity the order book will allow.


            For futures, this will be the threshold at which a position gets closed

            and so it should be as close as possible, preferably equal, to the

            `step_size`.'
        maxQuantity:
          type: string
          format: decimal
          description: Maximum quantity the order book will allow.
        stepSize:
          type: string
          format: decimal
          description: Quantity increment.
    ResolutionCondition_QuantityRangeResolutionCondition:
      description: Condition that determines how a prediction market resolves.
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - QuantityRange
            example: QuantityRange
      - $ref: '#/components/schemas/QuantityRangeResolutionCondition'
    QuantityRangeResolutionCondition:
      type: object
      title: QuantityRangeResolutionCondition
      description: Resolution condition based on quantity range.
      properties:
        greaterThanOrEqual:
          type: string
          format: decimal
          description: Lower bound (inclusive) for the quantity.
        lessThan:
          type: string
          format: decimal
          description: Upper bound (exclusive) for the quantity.
    KlineInterval:
      type: string
