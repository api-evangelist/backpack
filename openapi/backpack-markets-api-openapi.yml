      - 6h
      - 8h
      - 12h
      - 1d
      - 3d
      - 1w
      - 1month
    Market:
      type: object
      title: Market
      required:
      - symbol
      - baseSymbol
      - quoteSymbol
      - marketType
      - filters
      - orderBookState
      - createdAt
      - visible
      properties:
        symbol:
          type: string
          description: Symbol of the market, e.g. `ETH_USDC`
        baseSymbol:
          type: string
          description: The base asset of the market.
        quoteSymbol:
          type: string
          description: The quote asset of the market.
        marketType:
          description: The type of the market.
          allOf:
          - $ref: '#/components/schemas/MarketType'
          - description: The type of the market.
        filters:
          description: Price, lot and leverage rules.
          allOf:
          - $ref: '#/components/schemas/OrderBookFilters'
          - description: Price, lot and leverage rules.
        imfFunction:
          description: IMF function.
          allOf:
          - $ref: '#/components/schemas/PositionImfFunction'
          - description: IMF function.
        mmfFunction:
          description: MMF function.
          allOf:
          - $ref: '#/components/schemas/PositionImfFunction'
          - description: MMF function.
        fundingInterval:
          type: integer
          format: uint64
          description: Funding interval for perpetuals in milliseconds.
        fundingRateUpperBound:
          type: string
          format: decimal
          description: 'Funding rate upper bound for perpetual markets. In basis points. E.g. 10

            = 10bps'
        fundingRateLowerBound:
          type: string
          format: decimal
          description: 'Funding rate lower bound for perpetual markets. In basis points. E.g.

            -10 = -10bps'
        openInterestLimit:
          type: string
          format: decimal
          description: Maximum open interest limit for the market if the market is a future.
        orderBookState:
          description: The order book state.
          allOf:
          - $ref: '#/components/schemas/OrderBookState'
          - description: The order book state.
        createdAt:
          type: string
          format: naive-date-time
          description: Market created at time.
        visible:
          type: boolean
          description: Market currently visible.
        positionLimitWeight:
          type: string
          format: decimal
          description: 'Position limit weight coefficient.

            Used to calculate position limits when clearing a trade.'
    Ticker:
      type: object
      title: Ticker
      description: 'Public ticker response shape.


        Lives in `bpx_api_types` so that both `api` and `api-klines` can return

        the same JSON shape to clients.'
      required:
      - symbol
      - firstPrice
      - lastPrice
      - priceChange
      - priceChangePercent
      - high
      - low
      - volume
      - quoteVolume
      - trades
      properties:
        symbol:
          type: string
          description: The symbol of the market.
        firstPrice:
          type: string
          format: decimal
          description: First price for the interval.
        lastPrice:
          type: string
          format: decimal
          description: Last price for the interval.
        priceChange:
          type: string
          format: decimal
          description: Price change for the interval.
        priceChangePercent:
          type: string
          format: decimal
          description: Percentage price change for the interval.
        high:
          type: string
          format: decimal
          description: Highest price for the interval.
        low:
          type: string
          format: decimal
          description: Lowest price for the interval.
        volume:
          type: string
          format: decimal
          description: Base volume for the interval.
        quoteVolume:
          type: string
          format: decimal
          description: Quote volume for the interval.
        trades:
          type: string
          description: Trades for the interval.
    MarketType:
      type: string
      enum:
      - SPOT
      - PERP
      - IPERP
      - DATED
      - PREDICTION
      - RFQ
    Security:
      type: object
      title: Security
      required:
      - asset
      - name
      - sessions
      properties:
        asset:
          description: Asset symbol.
          allOf:
          - $ref: '#/components/schemas/CustodyAsset'
          - description: Asset symbol.
        name:
          type: string
          description: Name.
        cusip:
          type: string
          description: CUSIP identifier for the security.
        sessions:
          type: array
          description: Trading sessions with their active hours and quantity filters.
          items:
            $ref: '#/components/schemas/SecuritySession'
    Event:
      type: object
      title: Event
      required:
      - slug
      - title
      - predictionMarkets
      - tags
      - series
      - description
      - quoteVolume
      - resolution
      - resolved
      - resolutionDelaySecs
      properties:
        slug:
          type: string
          description: 'The identifier for the event that the prediction markets are based on.

            Multiple markets for the same event (e.g. `2026-fifa-world-cup-winner-mens`) will have the same identifier.'
        title:
          type: string
          description: 'The title for the prediction event that the prediction markets are based on.

            Multiple prediction markets may have the same title

            E.g. a set of prediction markets of the winner of the world cup would have title `2026 FIFA World Cup Winner`'
        predictionMarkets:
          type: array
          description: The prediction markets associated with this event.
          items:
            $ref: '#/components/schemas/PredictionMarket'
        tags:
          type: array
          description: Tags associated with the prediction event e.g. `["SPORTS", "FOOTBALL", "WORLD CUP"]`
          items:
            $ref: '#/components/schemas/Tag'
        series:
          type: array
          description: 'The series of the prediction event.

            Every world cup winner market will have the same series.'
          items:
            $ref: '#/components/schemas/Series'
        description:
          type: string
          description: A description of the event.
        imgUrl:
          type: string
          description: An image URL associated with the event.
        quoteVolume:
          type: string
          format: decimal
          description: The total 24hr quote volume of the prediction event.
        resolution:
          description: Resolution data for the prediction event.
          allOf:
          - $ref: '#/components/schemas/Resolution'
          - description: Resolution data for the prediction event.
        resolved:
          type: boolean
          description: Whether the event has been resolved.
        resolutionDelaySecs:
          type: integer
          format: int32
          description: 'Seconds to wait after a market''s proposed resolution before resolving it.

            Applied to every market in the event. Bounded server-side to [0, 604800] (7 days).'
    OrderBookState:
      type: string
      enum:
      - Open
      - Closed
      - CancelOnly
      - LimitOnly
      - PostOnly
    ResolutionSource:
      type: string
      description: Source for event resolution prices.
      enum:
      - binance
    PriceFilter:
      type: object
      title: PriceFilter
      required:
      - minPrice
      - tickSize
      properties:
        minPrice:
          type: string
          format: decimal
          description: Minimum price the order book will allow.
        maxPrice:
          type: string
          format: decimal
          description: Maximum price the order book will allow.
        tickSize:
          type: string
          format: decimal
          description: Price increment.
        maxMultiplier:
          type: string
          format: decimal
          description: Maximum allowed multiplier from last active price.
        minMultiplier:
          type: string
          format: decimal
          description: Minimum allowed multiplier from last active price.
        maxImpactMultiplier:
          type: string
          format: decimal
          description: 'Maximum allowed impact multiplier from best offer. This

            determines how far above the best ask a market buy can penetrate.'
        minImpactMultiplier:
          type: string
          format: decimal
          description: 'Minimum allowed impact multiplier from best bid. This

            determines how far below the best bid a market sell can penetrate.'
        meanMarkPriceBand:
          description: 'Futures price band. Used to determine how far the price is allowed to

            deviate from the mean mark price.'
          allOf:
          - $ref: '#/components/schemas/PriceBandMarkPrice'
          - description: 'Futures price band. Used to determine how far the price is allowed to

              deviate from the mean mark price.'
        meanPremiumBand:
          description: 'Futures price band. Used to determine how far the premium is allowed to

            deviate from the mean premium.'
          allOf:
          - $ref: '#/components/schemas/PriceBandMeanPremium'
          - description: 'Futures price band. Used to determine how far the premium is allowed to

              deviate from the mean premium.'
        borrowEntryFeeMaxMultiplier:
          type: string
          format: decimal
          description: 'Maximum allowed multiplier move from last active price without incurring

            an entry fee for spot margin.'
        borrowEntryFeeMinMultiplier:
          type: string
          format: decimal
          description: 'Minimum allowed multiplier move from last active price without incurring

            an entry fee for spot margin.'
        maxPriceUpdateMultiplier:
          type: string
          format: decimal
          description: 'Maximum allowed multiplier for mark/index price updates relative to

            the previous mark/index price. When set, an update is capped at

            `prev * max_price_update_multiplier`.'
        minPriceUpdateMultiplier:
          type: string
          format: decimal
          description: 'Minimum allowed multiplier for mark/index price updates relative to

            the previous mark/index price. When set, an update is floored at

            `prev * min_price_update_multiplier`.'
