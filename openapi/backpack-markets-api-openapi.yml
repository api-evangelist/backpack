      - '10'
      - '20'
      - '50'
      - '100'
      - '500'
      - '1000'
    SeriesRecurrence:
      type: string
      enum:
      - minutely
      - fiveMinutely
      - fifteenMinutely
      - hourly
      - daily
      - weekly
      - monthly
    MarketSession:
      type: object
      title: MarketSession
      required:
      - name
      - startTime
      - endTime
      - timezone
      - startWeekday
      - endWeekday
      properties:
        name:
          type: string
          description: Session name (e.g. "US_MARKET_HOURS").
        description:
          type: string
          description: Session description.
        startTime:
          type: string
          format: naive-time
          description: Session start time (local to the timezone).
        endTime:
          type: string
          format: naive-time
          description: Session end time (local to the timezone).
        timezone:
          type: string
          description: Timezone identifier (e.g. "America/New_York").
        startWeekday:
          type: integer
          format: int32
          description: ISO 8601 weekday on which the session opens (1 = Monday, 7 = Sunday).
        endWeekday:
          type: integer
          format: int32
          description: 'ISO 8601 weekday on which the session last opens. If `endWeekday <

            startWeekday` the range wraps the week (e.g. `7..4` = Sun-Thu).'
    PositionImfFunction:
      type: object
      anyOf:
      - $ref: '#/components/schemas/PositionImfFunction_SqrtFunction'
      discriminator:
        propertyName: type
        mapping:
          sqrt: '#/components/schemas/PositionImfFunction_SqrtFunction'
    OutcomeResolutionCondition:
      type: object
      title: OutcomeResolutionCondition
      description: Outcome resolution condition wrapper.
      required:
      - outcome
      properties:
        outcome:
          type: string
    SqrtFunction:
      type: object
      title: SqrtFunction
      required:
      - base
