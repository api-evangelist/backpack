    PositionImfFunction_SqrtFunction:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - sqrt
            example: sqrt
      - $ref: '#/components/schemas/SqrtFunction'
    PredictionMarket:
      type: object
      title: PredictionMarket
      required:
      - marketSymbol
      - question
      - yesOutcomeLabel
      - noOutcomeLabel
      - rules
      - activePrice
      - quoteVolume
      - quoteVolumeLifetime
      - resolutionDelaySecs
      properties:
        marketSymbol:
          type: string
        question:
          type: string
          description: The question that the prediction market will resolve e.g. `'Will England win the 2026 FIFA World Cup?'`
        groupLabel:
          type: string
          description: The short textual label summarising the different market outcomes composing an event.
        yesOutcomeLabel:
          type: string
          description: The yes outcome of the prediction market e.g. "England" for the football match England vs Brazil.
        noOutcomeLabel:
          type: string
          description: The no outcome of the prediction market e.g. "Brazil" for the football match England vs Brazil.
        rules:
          type: string
          description: The rules of the prediction market e.g. "The team that wins the 2025 men's world cup."
        resolvedAt:
          type: string
          format: naive-date-time
          description: Time at which the prediction market was resolved.
        resolutionPrice:
          type: string
          format: decimal
          description: The price at which the prediction market was resolved.
        activePrice:
          type: string
          format: decimal
          description: The active traded price of the prediction market.
        quoteVolume:
          type: string
          format: decimal
          description: The 24hr quote volume of the prediction market.
        quoteVolumeLifetime:
          type: string
          format: decimal
          description: The lifetime quote volume of the prediction market.
        imgUrl:
          type: string
          description: An image URL associated with the market.
        resolutionCondition:
          description: The condition that determines how the prediction market resolves.
          allOf:
          - $ref: '#/components/schemas/ResolutionCondition'
          - description: The condition that determines how the prediction market resolves.
        proposedResolution:
          type: boolean
          description: The proposed resolution for the market (true = yes, false = no).
        proposedResolutionAt:
          type: string
          format: naive-date-time
          description: Time at which the proposed resolution was set.
        resolutionDelaySecs:
          type: integer
          format: int32
          description: 'Seconds to wait after `proposed_resolution_at` before this market is resolved.

            Bounded server-side to [0, 604800] (7 days).'
    PriceBandMarkPrice:
      type: object
      title: PriceBandMarkPrice
      required:
      - maxMultiplier
      - minMultiplier
      properties:
        maxMultiplier:
          type: string
          format: decimal
          description: Maximum allowed multiplier move from mean price.
        minMultiplier:
          type: string
          format: decimal
          description: Minimum allowed multiplier move from mean price.
    Depth:
      type: object
      title: Depth
      required:
      - asks
      - bids
      - lastUpdateId
      - timestamp
      properties:
        asks:
          type: array
          description: Asks on the order book.
          items:
            type: array
            items:
              type: string
              format: decimal
            maxLength: 2
            minLength: 2
        bids:
          type: array
          description: Bids on the order book.
          items:
            type: array
            items:
              type: string
              format: decimal
            maxLength: 2
            minLength: 2
        lastUpdateId:
          type: string
          description: Update ID that caused the last change to the order book depth.
        timestamp:
          type: integer
          format: int64
          description: Matching engine timestamp in microseconds.
      example:
        asks:
        - - '21.9'
          - '500.123'
        - - '22.1'
          - '2321.11'
        bids:
        - - '20.12'
          - '255.123'
        - - '20.5'
          - '499.555'
        lastUpdateId: '1684026955123'
        timestamp: 1684026955123
    Series:
      type: object
      title: Series
      required:
      - slug
      - title
      properties:
        slug:
          type: string
          description: 'The series id of the prediction event e.g. `world-cup-winner-mens`.

            Every world cup winner market will have the same series id.'
        title:
          type: string
          description: The series title of the prediction event e.g. `World Cup winner (mens)`
        recurrence:
          description: The recurrence of the series e.g. `Weekly`.
          allOf:
          - $ref: '#/components/schemas/SeriesRecurrence'
          - description: The recurrence of the series e.g. `Weekly`.
    TickerInterval:
      type: string
      enum:
      - 1d
      - 1w
    OpenInterest:
      type: object
      title: OpenInterest
      required:
      - symbol
      - timestamp
      properties:
        symbol:
          type: string
          description: The symbol of the market.
        openInterest:
          type: string
          format: decimal
          description: The open interest.
        timestamp:
          type: integer
          format: int64
          description: Timestamp.
    Kline:
      type: object
      title: Kline
