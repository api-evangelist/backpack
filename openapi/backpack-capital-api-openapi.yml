components:
  schemas:
    AccountWithdrawalPayload:
      type: object
      title: AccountWithdrawalPayload
      required:
      - address
      - blockchain
      - quantity
      - symbol
      properties:
        address:
          type: string
          description: Address to withdraw to.
        blockchain:
          description: Blockchain to withdraw on.
          allOf:
          - $ref: '#/components/schemas/Blockchain'
          - description: Blockchain to withdraw on.
        clientId:
          type: string
          description: Custom client id.
          maxLength: 255
        quantity:
          type: string
          format: decimal
          description: Quantity to withdraw.
        symbol:
          description: Symbol of the asset to withdraw.
          allOf:
          - $ref: '#/components/schemas/CustodyAsset'
          - description: Symbol of the asset to withdraw.
        twoFactorToken:
          type: string
          description: Issued two factor token.
        autoBorrow:
          type: boolean
          description: Auto borrow to withdraw if required.
        autoLendRedeem:
          type: boolean
          description: Auto redeem a lend if required.
        recipientInformation:
          default: null
          allOf:
          - $ref: '#/components/schemas/WithdrawalRecipientInformation'
          - default: null
    ApiErrorResponse:
      type: object
      title: ApiErrorResponse
      required:
      - code
      - message
      properties:
        code:
          $ref: '#/components/schemas/ApiErrorCode'
        message:
          type: string
    MarginAccountSummary:
      type: object
      title: MarginAccountSummary
      required:
      - assetsValue
      - borrowLiability
      - collateral
      - imf
      - unsettledEquity
      - liabilitiesValue
      - mmf
      - netEquity
      - netEquityAvailable
      - netEquityLocked
      - netExposureFutures
      - pnlUnrealized
      properties:
        assetsValue:
          type: string
          format: decimal
          description: Notional value of assets
        borrowLiability:
          type: string
          format: decimal
          description: Total borrow notional.
        collateral:
          type: array
          description: Collateral held for a given spot asset.
          items:
            $ref: '#/components/schemas/Collateral'
        imf:
          type: string
          format: decimal
          description: Initial margin fraction.
        unsettledEquity:
          type: string
          format: decimal
          description: Unsettled claim on the liquidity fund.
        liabilitiesValue:
          type: string
          format: decimal
          description: Notional value of liabilities
        marginFraction:
          type: string
          format: decimal
          description: Margin fraction.
        mmf:
          type: string
          format: decimal
          description: Maintenance margin fraction.
        netEquity:
          type: string
          format: decimal
          description: Net equity.
        netEquityAvailable:
          type: string
          format: decimal
          description: Net equity available.
        netEquityLocked:
          type: string
          format: decimal
          description: Net equity Locked.
        netExposureFutures:
          type: string
          format: decimal
          description: Total exposure of positions as well potential open positions.
        pnlUnrealized:
          type: string
          format: decimal
          description: Unrealised PnL.
    SettlementSourceFilter:
      type: string
      enum:
      - BackstopLiquidation
      - CulledBorrowInterest
      - CulledRealizePnl
      - CulledRealizePnlBookUtilization
      - FundingPayment
      - RealizePnl
      - TradingFees
      - TradingFeesSystem
    EqualsMoneyWithdrawalState:
      type: string
      enum:
      - initialized
      - pending
      - fulfilling
      - processing
      - complete
      - declined
      - cancelled
      - review
      - awaitingDocuments
      - awaitingComplianceQuestions
      - refundedInternal
      - refundedExternal
    AccountConvertDustPayload:
      type: object
      title: AccountConvertDustPayload
      properties:
        symbol:
          description: 'The asset symbol to convert dust for.

            If omitted, all dust balances will be converted.'
          allOf:
          - $ref: '#/components/schemas/CustodyAsset'
          - description: 'The asset symbol to convert dust for.

              If omitted, all dust balances will be converted.'
    Deposit:
      type: object
      title: Deposit
      required:
      - id
      - source
      - status
      - symbol
      - quantity
      - createdAt
      properties:
        id:
          type: integer
          format: int32
          description: Unique id of the deposit.
        toAddress:
          type: string
          description: Deposit address.
        fromAddress:
          type: string
          description: Source address.
        source:
          description: Source of the deposit, blockchain or a payment processor.
          allOf:
          - $ref: '#/components/schemas/DepositSource'
          - description: Source of the deposit, blockchain or a payment processor.
        status:
          description: Status of the deposit.
          allOf:
          - $ref: '#/components/schemas/DepositStatus'
          - description: Status of the deposit.
        transactionHash:
          type: string
          description: Transaction hash of the blockchain transfer.
        symbol:
          description: Symbol of the asset to be deposited.
          allOf:
          - $ref: '#/components/schemas/CustodyAsset'
          - description: Symbol of the asset to be deposited.
        quantity:
          type: string
          format: decimal
          description: Quantity to be deposited.
        createdAt:
          type: string
          format: naive-date-time
          description: When the deposit was created.
        fiatAmount:
          type: number
          format: double
          description: Amount in fiat currency.
        fiatCurrency:
          description: Currency of the fiat amount.
          allOf:
          - $ref: '#/components/schemas/FiatAsset'
          - description: Currency of the fiat amount.
        institutionBic:
          type: string
          description: Institution BIC.
        platformMemo:
          type: string
          description: An optional memo that may be provided by the platform.
    Withdrawal:
      type: object
      title: Withdrawal
      required:
      - id
      - blockchain
      - quantity
      - fee
      - symbol
      - status
      - toAddress
      - createdAt
      - isInternal
      properties:
        id:
          type: integer
          format: int32
          description: Unique id of the withdrawal.
        blockchain:
          description: Blockchain the withdrawal was requested for.
          allOf:
          - $ref: '#/components/schemas/Blockchain'
          - description: Blockchain the withdrawal was requested for.
        clientId:
          type: string
          description: Custom client id.
        identifier:
          type: string
          description: Transaction hash of the withdrawal, if it has been sent.
        quantity:
          type: string
          format: decimal
          description: Quantity of the asset to withdraw.
        fee:
          type: string
          format: decimal
          description: Fee charged.
        fiatFee:
          type: string
          format: decimal
          description: Fiat fee charged.
        fiatState:
          description: Fiat state for Equals Money.
          allOf:
          - $ref: '#/components/schemas/EqualsMoneyWithdrawalState'
          - description: Fiat state for Equals Money.
        fiatSymbol:
          description: Fiat symbol.
          allOf:
          - $ref: '#/components/schemas/FiatAsset'
          - description: Fiat symbol.
        providerId:
          type: string
          description: Provider ID for payment provider.
        symbol:
          description: Symbol of the asset to withdraw.
          allOf:
          - $ref: '#/components/schemas/CustodyAsset'
          - description: Symbol of the asset to withdraw.
        status:
          description: Status of the withdrawal.
          allOf:
          - $ref: '#/components/schemas/WithdrawalStatus'
          - description: Status of the withdrawal.
        subaccountId:
          type: integer
          format: uint16
          description: ID of the subaccount requesting this withdrawal.
        toAddress:
          type: string
          description: Address to withdraw to.
        transactionHash:
          type: string
          description: Transaction hash of withdrawal.
        createdAt:
          type: string
          format: naive-date-time
          description: When the withdrawal was created.
        isInternal:
          type: boolean
          description: Whether the withdrawal is an internal transfer.
        bankName:
          type: string
          description: Bank name.
        bankIdentifier:
          type: string
          description: Bank identifier.
        accountIdentifier:
          type: string
          description: Account identifier.
        triggerAt:
          type: string
          format: naive-date-time
          description: When the withdrawal is to be triggered.
    DepositAddress:
      type: object
      title: DepositAddress
      required:
      - address
      properties:
        address:
          type: string
          description: Address.
