    DepositStatus:
      type: string
      enum:
      - cancelled
      - confirmed
      - declined
      - expired
      - initiated
      - ownershipVerificationRequired
      - pending
      - refunded
      - senderVerificationCompleted
      - senderVerificationRequired
    SettlementSource:
      type: string
      enum:
      - TradingFees
      - TradingFeesSystem
      - FundingPayment
      - CulledBorrowInterest
      - CulledRealizePnlAuto
      - CulledRealizePnlBookUtilisation
      - CulledRealizePnlAccountThreshold
      - CulledRealizePnlSystemThreshold
      - RealizePnl
      - BackstopProviderLiquidation
      - BackstopAdlLiquidation
      - BackstopLiquidityFundProceeds
      - SystemLiabilityTransfer
    Balance:
      type: object
      title: Balance
      required:
      - available
      - locked
      - staked
      properties:
        available:
          type: string
          format: decimal
          description: Funds available for use.
        locked:
          type: string
          format: decimal
          description: 'Funds that are locked because they are in an order that has not been

            executed.'
        staked:
          type: string
          format: decimal
          description: Funds that are staked.
    Collateral:
      type: object
      title: Collateral
      required:
      - symbol
      - assetMarkPrice
      - totalQuantity
      - balanceNotional
      - collateralWeight
      - collateralValue
      - openOrderQuantity
      - lendQuantity
      - availableQuantity
      properties:
        symbol:
          type: string
          description: Spot asset of the collateral.
        assetMarkPrice:
          type: string
          format: decimal
          description: Mark price of spot instrument
        totalQuantity:
          type: string
          format: decimal
          description: Pre haircut quantity of the asset.
        balanceNotional:
          type: string
          format: decimal
          description: 'Balance of spot instrument in USDC.

            This is calculated as `index_price * balance`.'
        collateralWeight:
          type: string
          format: decimal
          description: Collateral weight of spot instrument, applied as a haircut.
        collateralValue:
          type: string
          format: decimal
          description: 'Collateral Value (or adjusted equity).

            This is calculated as `index_price * balance * collateral_weight`.'
        openOrderQuantity:
          type: string
          format: decimal
          description: The amount added to collateral from open orders.
        lendQuantity:
          type: string
          format: decimal
          description: The amount added to collateral from lending.
        availableQuantity:
          type: string
          format: decimal
          description: The amount of freely available assets.
    Settlement:
      type: object
      title: Settlement
      required:
      - quantity
      - source
      - timestamp
      - userId
      properties:
        quantity:
          type: string
          format: decimal
          description: Quantity of the settlement.
        source:
          description: Source of the settlement.
          allOf:
          - $ref: '#/components/schemas/SettlementSource'
          - description: Source of the settlement.
        subaccountId:
          type: integer
          format: int32
          description: ID of the subaccount the event is associated with, if any.
        timestamp:
          type: string
          format: naive-date-time
          description: The timestamp of the settlement (UTC).
        userId:
          type: integer
          format: int32
          description: User ID of the account the movement is associated with.
        positionId:
          type: string
          description: 'Position ID of the position the settlement is associated with, if any.

            Applies to funding payments and realized PnL settlements.'
        engineSequence:
          type: integer
          format: uint64
          description: Engine sequence number of the settlement event.
    DustConversion:
      type: object
      title: DustConversion
      required:
      - id
      - quantity
      - symbol
      - usdcReceived
      - timestamp
      properties:
        id:
          type: integer
          format: uint64
          description: The ID of the dust conversion.
        quantity:
          type: string
          format: decimal
          description: Dust quantity.
        symbol:
          type: string
          description: Symbol.
        usdcReceived:
          type: string
          format: decimal
          description: USDC received.
        timestamp:
          type: string
          format: naive-date-time
          description: Timestamp.
    ApiErrorCode:
      type: string
      enum:
      - ACCOUNT_DEACTIVATED
      - ACCOUNT_LIQUIDATING
      - BORROW_LIMIT
      - BORROW_REQUIRES_LEND_REDEEM
